<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Advanced Calculator</h1>
    <button id="darkToggle" aria-label="Toggle Dark Mode">🌙</button>
</header>

<main class="calculator" role="application" aria-label="Advanced Calculator">

    <!-- Display -->
    <div class="display-container">
        <input type="text" id="display" aria-label="Calculator Display" readonly>
    </div>

    <!-- Buttons -->
    <div class="buttons">

        <!-- Row 1 -->
        <button onclick="clearDisplay()" aria-label="Clear">AC</button>
        <button onclick="memoryClear()">MC</button>
        <button onclick="memoryRecall()">MR</button>
        <button onclick="memoryAdd()">M+</button>
        <button onclick="memorySubtract()">M-</button>

        <!-- Row 2 -->
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('/')">÷</button>
        <button onclick="sqrt()">√</button>

        <!-- Row 3 -->
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('*')">×</button>
        <button onclick="power()">xʸ</button>

        <!-- Row 4 -->
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('-')">−</button>
        <button onclick="percentage()">%</button>

        <!-- Row 5 -->
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="appendValue('+')">+</button>
        <button onclick="appendValue('Math.PI')">π</button>

        <!-- Scientific -->
        <button onclick="appendValue('Math.sin(')">sin</button>
        <button onclick="appendValue('Math.cos(')">cos</button>
        <button onclick="appendValue('Math.tan(')">tan</button>
        <button onclick="appendValue('Math.log10(')">log</button>
        <button onclick="appendValue('Math.E')">e</button>

    </div>

    <!-- History -->
    <div class="history">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>

</main>

<script src="script.js"></script>
</body>
          </html>
